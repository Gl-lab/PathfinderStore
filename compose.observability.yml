services:
  seq:
    image: datalust/seq:2025.2
    container_name: pathfinder-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "127.0.0.1:5341:80"
    restart: unless-stopped
    volumes:
      - pathfinder-seq-data:/data

volumes:
  pathfinder-seq-data:
